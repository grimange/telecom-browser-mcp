name: Tool Contracts

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/tool-contracts.yml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/tool-contracts.yml"
      - "pyproject.toml"

jobs:
  tool_contract_schema_parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Schema/signature parity checks
        run: |
          pytest -q \
            tests/contracts/test_tool_contract_parity.py::test_tool_listing_matches_catalog \
            tests/contracts/test_tool_contract_parity.py::test_signature_schema_parity_for_registered_tools \
            tests/contracts/test_registration_pattern_static.py::test_canonical_registration_site_is_unique \
            tests/contracts/test_registration_pattern_static.py::test_register_function_binds_direct_handler

  tool_contract_invocation_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Invocation smoke checks
        run: |
          pytest -q \
            tests/contracts/test_tool_contract_parity.py::test_valid_invocation_noarg_tool \
            tests/e2e/test_stdio_smoke.py

  tool_contract_strictness_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Strictness and invalid-input checks
        run: |
          pytest -q \
            tests/contracts/test_tool_contract_parity.py::test_invalid_envelope_rejected_for_noarg_tool \
            tests/contracts/test_tool_contract_parity.py::test_noarg_tools_publish_empty_object_schema \
            tests/contracts/test_tool_contract_parity.py::test_all_tools_publish_strict_input_schema \
            tests/contracts/test_tool_contract_parity.py::test_no_tool_publishes_synthetic_kwargs_field \
            tests/contracts/test_registration_pattern_static.py::test_register_function_has_no_nested_kwargs_wrapper \
            tests/unit/test_tool_invocation_compatibility.py::test_dispatch_does_not_forward_nested_kwargs_key

  tool_contract_static_guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Static contract drift guardrails
        run: |
          bash scripts/check_static_contract_guardrails.sh
