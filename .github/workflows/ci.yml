name: CI

on:
  push:
  pull_request:

jobs:
  contract-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Security SAST
        run: bandit -q -r src

      - name: Dependency Audit
        run: pip-audit

      - name: Verify Contract Schemas
        run: |
          python scripts/generate_contract_schemas.py
          git diff --exit-code docs/contracts/m1

      - name: Contract Suite
        run: pytest -q tests/contract tests/integration/test_server_registration.py

  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit Suite
        run: pytest -q tests/unit

  transport-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Live Transport Smoke
        env:
          MCP_REQUIRE_LIVE_TRANSPORT_RUNTIME: "1"
        run: |
          pytest -q \
            tests/integration/test_transport_entrypoints.py \
            tests/integration/test_stdio_smoke.py \
            tests/integration/test_http_transport_smoke.py

  packaging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Packaging Tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Distributions
        run: python -m build

      - name: Validate Wheel Install
        run: |
          python -m venv .pkg-venv
          .pkg-venv/bin/python -m pip install --upgrade pip
          .pkg-venv/bin/pip install dist/*.whl
          .pkg-venv/bin/python -m telecom_browser_mcp --help

      - name: Upload Dist Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/*

  browser-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Chromium With Host Dependencies
        run: python -m playwright install --with-deps chromium

      - name: Host Required E2E
        run: |
          pytest -q tests/e2e/test_fake_dialer_harness.py -rA | tee host-e2e.txt
          grep -Eq '[1-9][0-9]* passed' host-e2e.txt

      - name: Upload Host E2E Log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: host-e2e-log
          path: host-e2e.txt
