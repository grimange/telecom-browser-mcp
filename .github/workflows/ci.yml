name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Verify Contract Schemas
        run: |
          PYTHONPATH=src python scripts/generate_contract_schemas.py
          git diff --exit-code docs/contracts/m1

      - name: Pytest
        run: pytest -q
